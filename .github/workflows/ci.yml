name: CI
on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
      - 'codex/**'
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: "32 1 * * 1"

jobs:

  # ── Linux ──────────────────────────────────────────────────────────────────
  linux:
    name: Linux (ubuntu-22.04, gcc)
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build python3-pip libpq-dev
          pip3 install --quiet meson

      - name: Create PostgreSQL test database
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres \
            -c "CREATE USER thewatcher_test WITH PASSWORD 'thewatcher_test';"
          psql -h 127.0.0.1 -U postgres \
            -c "CREATE DATABASE thewatcher_test OWNER thewatcher_test;"

      - name: Cache Meson subproject downloads
        uses: actions/cache@v4
        with:
          path: subprojects/packagecache
          key: meson-wrap-linux-${{ hashFiles('subprojects/*.wrap') }}

      - name: Build and test (meson-build-linux.sh)
        env:
          THEWATCHER_POSTGRES_TEST_DSN: >-
            host=127.0.0.1 dbname=thewatcher_test
            user=thewatcher_test password=thewatcher_test
        run: ./meson-build-linux.sh

      - name: Archive build output
        id: upload-linux-build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: builddir-release/

      - name: Publish build download link
        if: always()
        env:
          ARTIFACT_URL: ${{ steps.upload-linux-build.outputs.artifact-url }}
        run: |
          {
            echo "### Build artifact"
            if [ -n "${ARTIFACT_URL}" ]; then
              echo "- [Download Linux build output](${ARTIFACT_URL})"
            else
              echo "- Linux build output artifact was not uploaded."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Windows ────────────────────────────────────────────────────────────────
  windows:
    name: Windows (windows-latest, MSVC 2022)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # Puts cl.exe, link.exe, and Windows SDK headers on PATH.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install Meson and Ninja
        run: pip install meson ninja

      - name: Cache Meson subproject downloads
        uses: actions/cache@v4
        with:
          path: subprojects/packagecache
          key: meson-wrap-windows-${{ hashFiles('subprojects/*.wrap') }}

      - name: Build and test (meson-build.cmd)
        # meson test builds only the test-target objects it needs; it does
        # not attempt to link TheWatcherServer / TheWatcherAgent whose
        # platform-service entry points are intentionally Windows-only.
        run: .\meson-build.cmd
        shell: cmd

      - name: Archive build output
        id: upload-windows-build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: builddir-release/

      - name: Publish build download link
        if: always()
        shell: pwsh
        env:
          ARTIFACT_URL: ${{ steps.upload-windows-build.outputs.artifact-url }}
        run: |
          "### Build artifact" >> $env:GITHUB_STEP_SUMMARY
          if ($env:ARTIFACT_URL) {
            "- [Download Windows build output]($env:ARTIFACT_URL)" >> $env:GITHUB_STEP_SUMMARY
          } else {
            "- Windows build output artifact was not uploaded." >> $env:GITHUB_STEP_SUMMARY
          }

  # ── FreeBSD ────────────────────────────────────────────────────────────────
  freebsd:
    name: FreeBSD 14 (clang)
    # The FreeBSD VM runs on top of an Ubuntu host via vmactions.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # The zeromq/libsodium pkg names on the vmactions FreeBSD 14.2 snapshot
      # are unreliable, and the VM's outbound network is restricted. Pre-fetch
      # the wrap archives on the Ubuntu host so the cmake/meson subprojects
      # can build libzmq and libsodium from source inside the VM without
      # needing the system packages or fresh downloads.
      - name: Cache Meson subproject downloads
        uses: actions/cache@v4
        with:
          path: subprojects/packagecache
          key: meson-wrap-freebsd-${{ hashFiles('subprojects/*.wrap') }}

      - name: Pre-fetch wrap source archives
        # We can't use `meson subprojects download` here: libzmq.wrap is a
        # CMake-only wrap (no meson.build under packagefiles/libzmq/), and
        # modern Meson's post-download validation exits 1 with
        # "Subproject exists but has no meson.build file" even when the
        # tarball downloads cleanly. Meson on the FreeBSD VM still builds
        # libzmq via the CMake fallback during `meson setup` -- we just
        # need the source tarballs cached so the VM (which has no
        # outbound network) can find them in subprojects/packagecache/.
        run: |
          set -euo pipefail
          mkdir -p subprojects/packagecache

          field() { awk -v key="$1" '$1==key && $2=="="{print $3; exit}' "$2"; }

          for wrap in subprojects/*.wrap; do
            name=$(basename "$wrap" .wrap)
            src_url=$(field source_url "$wrap")
            src_file=$(field source_filename "$wrap")
            src_hash=$(field source_hash "$wrap")
            patch_url=$(field patch_url "$wrap")
            patch_file=$(field patch_filename "$wrap")
            patch_hash=$(field patch_hash "$wrap")

            if [ -n "$src_url" ]; then
              dest="subprojects/packagecache/$src_file"
              if [ ! -f "$dest" ]; then
                echo "[$name] fetching $src_url"
                curl -fL --retry 3 --output "$dest" "$src_url"
              else
                echo "[$name] cache hit: $dest"
              fi
              [ -n "$src_hash" ] && echo "$src_hash  $dest" | sha256sum -c -
            fi

            if [ -n "$patch_url" ]; then
              dest="subprojects/packagecache/$patch_file"
              if [ ! -f "$dest" ]; then
                echo "[$name] fetching patch $patch_url"
                curl -fL --retry 3 --output "$dest" "$patch_url"
              else
                echo "[$name] cache hit: $dest"
              fi
              [ -n "$patch_hash" ] && echo "$patch_hash  $dest" | sha256sum -c -
            fi
          done

          ls -la subprojects/packagecache/

      - name: Build and test on FreeBSD 14 (meson-build-bsd.sh)
        uses: vmactions/freebsd-vm@v1
        with:
          release: '14.2'
          usesh: true
          # rsync the checked-out workspace (including subprojects/packagecache)
          # into the VM.
          sync: rsync
          copyback: true
          prepare: |
            pkg install -y cmake ninja meson pkgconf python3
          run: |
            set +e
            sh ./meson-build-bsd.sh
            status=$?
            echo "$status" > .freebsd-build-exit-code
            exit 0

      - name: Archive build output
        id: upload-freebsd-build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-freebsd
          path: builddir-release/

      - name: Publish build download link
        if: always()
        env:
          ARTIFACT_URL: ${{ steps.upload-freebsd-build.outputs.artifact-url }}
        run: |
          {
            echo "### Build artifact"
            if [ -n "${ARTIFACT_URL}" ]; then
              echo "- [Download FreeBSD build output](${ARTIFACT_URL})"
            else
              echo "- FreeBSD build output artifact was not uploaded."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail FreeBSD build if build/test failed
        if: always()
        run: |
          if [ ! -f .freebsd-build-exit-code ]; then
            echo "FreeBSD build status file was not copied back from the VM."
            exit 1
          fi

          status=$(cat .freebsd-build-exit-code)
          if [ "$status" != "0" ]; then
            echo "FreeBSD build/test failed with exit code $status."
            exit "$status"
          fi
